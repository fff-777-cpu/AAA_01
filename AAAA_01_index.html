<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元素神経衰弱</title>

<style>
body {
  text-align: center;
  font-family: sans-serif;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 80px);
  gap: 10px;
  justify-content: center;
}

.card {
  width: 80px;
  height: 100px;
  background: #4CAF50;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  border-radius: 8px;
}

.flipped {
  background: white;
  color: black;
}
</style>
</head>

<body>

<h2>元素神経衰弱</h2>
<div class="grid" id="game"></div>

<script>
const elements = [
  {symbol:"H", name:"水素"},
  {symbol:"O", name:"酸素"},
  {symbol:"C", name:"炭素"},
  {symbol:"N", name:"窒素"}
];

// カード作成
let cards = [];
elements.forEach(e => {
  cards.push({value:e.symbol, pair:e.name});
  cards.push({value:e.name, pair:e.symbol});
});

// シャッフル
cards.sort(() => Math.random() - 0.5);

const game = document.getElementById("game");

let first = null;
let second = null;

cards.forEach(card => {
  const div = document.createElement("div");
  div.className = "card";
  div.innerText = "?";

  div.onclick = () => {
    if (div.classList.contains("flipped") || second) return;

    div.classList.add("flipped");
    div.innerText = card.value;

    if (!first) {
      first = div;
    } else {
      second = div;

      if (first.innerText === card.pair) {
        first = null;
        second = null;
      } else {
        setTimeout(() => {
          first.classList.remove("flipped");
          second.classList.remove("flipped");
          first.innerText = "?";
          second.innerText = "?";
          first = null;
          second = null;
        }, 800);
      }
    }
  };

  game.appendChild(div);
});
</script>

</body>
</html>
